version: "3.9"

services:
  api:
    build: .
    container_name: stockpilot-api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - db

    restart: unless-stopped

  db:
    image: postgres:16

    container_name: stockpilot-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stockpilot

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stockpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: unless-stopped

volumes:
  postgres_data: